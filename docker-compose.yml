services:
  app:
    build: .
    ports:
      - "9516:9516"   # host:container — reverse proxy to https://watch.carterfamily.top
    environment:
      - NODE_ENV=production
      - PORT=9516
      - TMDB_API_KEY=${TMDB_API_KEY}
      - DATABASE_URL=file:/app/data/watchbox.db
      # Cap Node heap to reduce memory use on small servers (tune or remove if you have RAM)
      - NODE_OPTIONS=--max-old-space-size=384
    volumes:
      - watchbox-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9516"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  watchbox-data:
