services:
  app:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-}
    ports:
      - "9516:9516"   # host:container — reverse proxy to https://watch.carterfamily.top
    environment:
      - NODE_ENV=production
      - PORT=9516
      - TMDB_API_KEY=${TMDB_API_KEY}
      - DATABASE_URL=file:/app/data/watchbox.db
      # Required for Plex (must match Portainer / stack.env — compose must reference them or they never reach the container)
      - PLEX_SERVER_URL=${PLEX_SERVER_URL:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}
      - PLEX_WEBHOOK_SECRET=${PLEX_WEBHOOK_SECRET:-}
      # Set to true to log full Plex webhook JSON to container stdout (docker logs)
      - PLEX_WEBHOOK_LOG_RAW=${PLEX_WEBHOOK_LOG_RAW:-}
      # Cap Node heap to reduce memory use on small servers (tune or remove if you have RAM)
      - NODE_OPTIONS=--max-old-space-size=384
    volumes:
      - watchbox-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9516"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  watchbox-data:
