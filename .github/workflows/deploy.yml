name: Build and Deploy to Portainer

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-portainer:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Portainer
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_ACCESS_TOKEN: ${{ secrets.PORTAINER_ACCESS_TOKEN }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
        run: |
          if [ -z "$PORTAINER_URL" ]; then
            echo "PORTAINER_URL secret not set. Add it in Settings > Secrets and variables > Actions to enable deploy."
            exit 0
          fi
          # Pull the latest image in Portainer stack
          curl -sf -X PUT "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID?endpointId=$PORTAINER_ENDPOINT_ID" \
            -H "X-API-Key: $PORTAINER_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "pullImage": true,
              "prune": false
            }'
          
          # Restart the stack
          curl -sf -X POST "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID/stop?endpointId=$PORTAINER_ENDPOINT_ID" \
            -H "X-API-Key: $PORTAINER_ACCESS_TOKEN"
          
          sleep 5
          
          curl -sf -X POST "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID/start?endpointId=$PORTAINER_ENDPOINT_ID" \
            -H "X-API-Key: $PORTAINER_ACCESS_TOKEN"

      - name: Deployment notification
        if: success()
        run: |
          echo "✅ Successfully deployed WatchBox to Portainer!"
          echo "Image: ghcr.io/${{ github.repository }}:latest"
