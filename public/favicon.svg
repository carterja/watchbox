<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#8b5cf6" flood-opacity="0.7"/>
    </filter>
  </defs>
  <!-- Box -->
  <rect x="10" y="15" width="80" height="70" rx="8" fill="none" stroke="url(#fg)" stroke-width="4" filter="url(#glow)"/>
  <!-- Film reels -->
  <circle cx="15" cy="25" r="3" fill="url(#fg)"/>
  <circle cx="15" cy="40" r="3" fill="url(#fg)"/>
  <circle cx="15" cy="55" r="3" fill="url(#fg)"/>
  <circle cx="15" cy="70" r="3" fill="url(#fg)"/>
  <circle cx="85" cy="25" r="3" fill="url(#fg)"/>
  <circle cx="85" cy="40" r="3" fill="url(#fg)"/>
  <circle cx="85" cy="55" r="3" fill="url(#fg)"/>
  <circle cx="85" cy="70" r="3" fill="url(#fg)"/>
  <!-- Play -->
  <path d="M 40 35 L 40 65 L 65 50 Z" fill="url(#fg)" filter="url(#glow)"/>
</svg>
